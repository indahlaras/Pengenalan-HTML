<!DOCTYPE html> <!--Menentukan bahwa ini adalah dokumen HTML-->
<html>
    <!--Tag yang membungkus seluruh isi dokumen-->

    <head>
    <!--Bagian kepala dokumen yang berisi metadata-->
        <!--Karakter set-->

        <meta charset="UTF-8"> 

        <!--Pengaturan tampilan mobile (reponsive)-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

         <!--Judul yang akan tampil di tab browser dan saat disimpan-->
        <title>Cara cepat belajar HTML</title>
       
        <!--Meta deskripsi untuk SEO -->
        <meta name="description" content="HTML pemula friendly.">

        <!--Link ke CSS Eksternal (Jika ada) -->
        <link rel="stylesheet" href="style.css">

        <!--Untuk style internal CSS di dalam html-->
        <style>
          body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
         }
         h1 {
            color: darkblue;
         }
        </style>
    </head>
    <body>
    <!--Bagian tubuh dari seluruh dokumen-->

        <!--Tag heading atau judul-->
        <h1>Halo teman-teman semua.</h1>
        <h2>Halo teman-teman semua.</h2>
        <h3>Halo teman-teman semua.</h3>
        <h4>Halo teman-teman semua.</h4>
        <h5>Halo teman-teman semua.</h5>
        <h6>Halo teman-teman semua.</h6>
        
        <!--Buat Paragraf -->
        <p>Ini paragraf di dalam web.</p>
        
        <!--Membuat Hyperlink-->
        <a href="[https://www.google.com]">Klik di sini ke Google</a>
        
        <!--Menampilkan gambar di halamn web.-->
        <img src="gambar.jpg" alt="Deskripsi Gambar">

        <!--Digunakan untuk mengelompokkan elemen-elemen-->
        <div class="container"> <p>Di dalam kotak</p> </div>

        <h2>Daftar Kelas.</h2>

        <!--Membuat daftar poin (bullet points)-->
        <ul>
            <li>X PPLG 1</li>
            <li>X PPLG 2</li>
        </ul>

        <!--Membuat daftar berurutan menggunakan angka atau huruf.-->
        <ol>
            <li>XI RPL 1</li>
            <li>XI RPL 2</li>
        </ol>
    </body>
</html>
